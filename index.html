<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Investiq App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: #161b22;
    }

    .container {
      padding: 20px;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 20px;
    }

    .card {
      background: #161b22;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      background: #21262d;
    }

    .buy { color: #00ff88; }
    .neutral { color: #ffaa00; }
    .sell { color: #ff4d4d; }

    canvas {
      margin-top: 30px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .premium {
      margin-top: 20px;
      padding: 15px;
      background: #21262d;
      border-radius: 10px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #00ff88;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>📊 Investiq App</header>

<div class="container">

  <h3>Escolha o país</h3>
  <select id="country" onchange="loadCompanies()">
    <option value="br">Brasil</option>
    <option value="us">EUA</option>
  </select>

  <div id="companies"></div>

  <canvas id="chart" height="100"></canvas>

  <div class="premium">
    🔒 Quer ver análises completas?  
    <br><br>
    <button onclick="alert('Em breve versão premium')">
      Desbloquear Premium
    </button>
  </div>

</div>

<script>
const API_KEY = "I8W3AU3UFSHXL26A";

const companies = {
  br: [
    { name: "Petrobras", symbol: "PETR4.SA" },
    { name: "Vale", symbol: "VALE3.SA" },
    { name: "Itaú", symbol: "ITUB4.SA" }
  ],
  us: [
    { name: "Apple", symbol: "AAPL" },
    { name: "Tesla", symbol: "TSLA" },
    { name: "Amazon", symbol: "AMZN" }
  ]
};

async function getStock(symbol) {
  try {
    const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`;
    const response = await fetch(url);
    const data = await response.json();

    const price = data["Global Quote"]["05. price"];
    return parseFloat(price).toFixed(2);
  } catch {
    return "Erro";
  }
}

async function loadCompanies() {
  const country = document.getElementById("country").value;
  const container = document.getElementById("companies");

  container.innerHTML = "Carregando dados reais...";

  container.innerHTML = "";

  for (let company of companies[country]) {
    const price = await getStock(company.symbol);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${company.name}</strong><br>
      Preço: $${price}
    `;

    container.appendChild(div);
  }
}

loadCompanies();
</script>
</script>

</body>
</html>
