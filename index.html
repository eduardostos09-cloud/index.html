<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Investiq App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

 <style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(90deg, #0d1117, #161b22);
  border-bottom: 1px solid #30363d;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

select {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #161b22;
  color: white;
  margin-bottom: 20px;
}

.card {
  background: linear-gradient(145deg, #161b22, #1c2128);
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid #30363d;
}

.card:hover {
  transform: scale(1.02);
  border-color: #00ff88;
}

.price {
  font-size: 20px;
  font-weight: bold;
}

.up {
  color: #00ff88;
}

.down {
  color: #ff4d4d;
}

.loading {
  opacity: 0.7;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity: 0.5; }
  50% { opacity: 1; }
  100% { opacity: 0.5; }
}

.premium {
  margin-top: 30px;
  padding: 20px;
  background: linear-gradient(145deg, #21262d, #161b22);
  border-radius: 14px;
  text-align: center;
  border: 1px solid #30363d;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: #00ff88;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>📊 Investiq App</header>

<div class="container">

  <h3>Escolha o país</h3>
  <select id="country" onchange="loadCompanies()">
    <option value="br">Brasil</option>
    <option value="us">EUA</option>
  </select>

  <div id="companies"></div>

  <canvas id="chart" height="100"></canvas>

  <div class="premium">
    🔒 Quer ver análises completas?  
    <br><br>
    <button onclick="alert('Em breve versão premium')">
      Desbloquear Premium
    </button>
  </div>

</div>

<script>
const API_KEY = "I8W3AU3UFSHXL26A";

const companies = {
  br: [
    { name: "Petrobras", symbol: "PBR" },
    { name: "Vale", symbol: "VALE" },
    { name: "Itaú", symbol: "ITUB" }
  ],
  us: [
    { name: "Apple", symbol: "AAPL" },
    { name: "Tesla", symbol: "TSLA" },
    { name: "Amazon", symbol: "AMZN" }
  ]
};

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
async function drawChart(symbol, name) {
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`;
  const response = await fetch(url);
  const data = await response.json();

  const timeSeries = data["Time Series (Daily)"];

  const labels = Object.keys(timeSeries).slice(0, 5).reverse();
  const prices = labels.map(date => timeSeries[date]["4. close"]);

  const ctx = document.getElementById("chart");

  if (window.chart) window.chart.destroy();

  window.chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: name,
        data: prices
      }]
    }
  });
}
} catch (e) {
    alert("Erro no gráfico");
  }
}
  async function getStock(symbol) {
  try {
    const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`;
    const response = await fetch(url);
    const data = await response.json();

    if (!data["Global Quote"] || !data["Global Quote"]["05. price"]) {
      return "Erro";
    }

    return parseFloat(data["Global Quote"]["05. price"]).toFixed(2);
  } catch (e) {
    return "Erro";
  }
}

async function loadCompanies() {
  const country = document.getElementById("country").value;
  const container = document.getElementById("companies");

  container.innerHTML = "Carregando dados reais...";

  for (let company of companies[country]) {
    const price = await getStock(company.symbol);

    const div = document.createElement("div");
    div.className = "card";

    const variation = (Math.random() * 4 - 2).toFixed(2);
const trendClass = variation >= 0 ? "up" : "down";

div.innerHTML = `
  <strong>${company.name}</strong><br>
  <span class="price ${trendClass}">$${price}</span><br>
  <small class="${trendClass}">
    ${variation}% hoje
  </small>
`;
    div.onclick = () => drawChart(company.symbol, company.name);
    container.appendChild(div);

    await sleep(3000);
  }
}

loadCompanies();
</script>
